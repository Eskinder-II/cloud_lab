        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(to right, #e3f2fd, #ffffff);
            color: #333;
        }

        header {
            background-color: #1565c0;
            color: white;
            padding: 20px;
            text-align: center;
        }

        header img {
            width: 60px;
            vertical-align: middle;
        }

        header h1 {
            margin: 10px 0 5px;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            border-bottom: 2px solid #1565c0;
            padding-bottom: 5px;
        }

        ul, ol {
            padding-left: 20px;
        }

        li {
            margin: 8px 0;
        }

        .card {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background-color: #f5f5f5;
        }

        footer {
            text-align: center;
            padding: 15px;
            background-color: #1565c0;
            color: white;
            margin-top: 30px;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
